<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos Locales PRO</title>

<link rel="stylesheet" href="styles.css">
</head>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2XTrUWKtWd_Pn3_8MJ5uZ7ysSO72ytdI",
  authDomain: "pedidos-locales.firebaseapp.com",
  projectId: "pedidos-locales",
  storageBucket: "pedidos-locales.firebasestorage.app",
  messagingSenderId: "1069589244691",
  appId: "1:1069589244691:web:a8f8da4f9091001736c8e6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// HACER GLOBAL (clave para tu app.js)
window.db = db;
window.collection = collection;
window.getDocs = getDocs;
window.updateDoc = updateDoc;
window.doc = doc;
window.onSnapshot = onSnapshot;

</script>
<body>

<header id="titulo">Pedidos CD Caucel</header>

<div id="home" class="container"></div>
<div id="menu" class="container" style="display:none;"></div>

<div class="fab" id="fab" onclick="toggleCart()">
🛒 $<span id="total-fab">0</span>
</div>

<div class="cart" id="cart">
<div class="cart-header">
<span>Tu pedido</span>
<button onclick="toggleCart()">✖</button>
</div>

<div class="cart-body">
<input id="direccion" placeholder="📍 Dirección">
<div id="cart-items"></div>
</div>

<button class="main compact" onclick="enviarPedido()">Enviar</button>
</div>

<div class="admin">
<h3>Panel Admin</h3>
<input id="pass" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
<div id="admin-panel"></div>
</div>

<script src="app.js"></script>

</body>
</html>
