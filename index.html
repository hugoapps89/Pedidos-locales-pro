<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos Locales PRO</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header id="titulo">Pedidos CD Caucel</header>

<div id="home" class="container"></div>
<div id="menu" class="container" style="display:none;"></div>

<div class="fab" id="fab" onclick="toggleCart()">
🛒 $<span id="total-fab">0</span>
</div>

<div class="cart" id="cart">
<div class="cart-header">
<span>Tu pedido</span>
<button onclick="toggleCart()">✖</button>
</div>

<div class="cart-body">
<input id="direccion" placeholder="📍 Dirección">
<div id="cart-items"></div>
</div>

<button class="main" onclick="enviarPedido()">Enviar</button>
</div>

<!-- ADMIN -->
<div class="admin">
<h3>Panel Admin</h3>
<input id="pass" placeholder="Contraseña">
<button onclick="login()">Entrar</button>
<div id="admin-panel"></div>
</div>

<!-- FORMULARIO -->
<div id="form-negocio" class="admin" style="display:none;">
<h3>Agregar negocio</h3>

<input id="n-nombre" placeholder="Nombre">
<input id="n-direccion" placeholder="Dirección">
<input id="n-imagen" placeholder="URL imagen">
<input id="n-telefono" placeholder="Teléfono">

<h4>Producto inicial</h4>
<input id="p-nombre" placeholder="Nombre producto">
<input id="p-precio" placeholder="Precio">
<input id="p-img" placeholder="URL imagen">

<button onclick="guardarNegocio()" class="main">Guardar negocio</button>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
